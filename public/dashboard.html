<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Panel de Reportes - Bacheo CBTis 23</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <header>
    <div class="nav-container">
      <div class="logo">
        <span>🚧</span> BacheoAlert 
        <span class="logo-cbtis">CBTis 23</span>
      </div>
      <div class="user-badge" id="userInfo">
        <!-- Renderizado dinámicamente -->
      </div>
    </div>
  </header>

  <main class="main-container">
    <!-- Estadísticas Rápidas -->
    <div class="stats-container">
      <div class="stat-card">
        <div class="stat-num" id="statReportados">0</div>
        <div class="stat-label">Reportados</div>
      </div>
      <div class="stat-card">
        <div class="stat-num" id="statProceso" style="color: var(--accent-amber);">0</div>
        <div class="stat-label">En proceso</div>
      </div>
      <div class="stat-card">
        <div class="stat-num" id="statReparados" style="color: var(--accent-green);">0</div>
        <div class="stat-label">Reparados</div>
      </div>
    </div>

    <div class="dashboard-grid">
      <!-- Columna Izquierda: Formulario de Reporte -->
      <section class="card">
        <h2>Reportar Nuevo Bache</h2>
        <form id="reportForm">
          <div class="form-group">
            <label for="titulo">¿Qué bache es? (Título breve)</label>
            <input type="text" id="titulo" placeholder="Ej. Bache profundo frente a la parada" required>
          </div>

          <div class="form-group">
            <label for="ubicacion">Ubicación exacta (Zona CBTis 23)</label>
            <select id="ubicacion" required>
              <option value="">Selecciona la ubicación...</option>
              <option value="Entrada Principal (Av. de las Partidas)">Entrada Principal (Av. de las Partidas)</option>
              <option value="Esquina del Estacionamiento Escolar">Esquina del Estacionamiento Escolar</option>
              <option value="Parada de Autobuses del CBTis">Parada de Autobuses del CBTis</option>
              <option value="Cruse peatonal frente al plantel">Cruce peatonal frente al plantel</option>
              <option value="Calle trasera de acceso estudiantil">Calle trasera de acceso estudiantil</option>
              <option value="Otra calle colindante de la zona escolar">Otra calle colindante de la zona escolar</option>
            </select>
          </div>

          <div class="form-group">
            <label for="gravedad">Nivel de Daño / Gravedad</label>
            <select id="gravedad" required>
              <option value="Baja">Bajo (Grietas o baches pequeños)</option>
              <option value="Media" selected>Medio (Dificulta el paso y daña llantas)</option>
              <option value="Alta">Alto (Peligro inminente de accidente vehicular/peatonal)</option>
            </select>
          </div>

          <div class="form-group">
            <label for="descripcion">Descripción detallada</label>
            <textarea id="descripcion" placeholder="Describe el tamaño, profundidad o afectación a la comunidad estudiantil..." required></textarea>
          </div>

          <button type="submit" class="btn btn-primary" style="width: 100%;">Enviar Reporte</button>
        </form>
      </section>

      <!-- Columna Derecha: Baches Activos y Votaciones -->
      <section>
        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 1.5rem;">
          <h2 style="margin-bottom: 0;">Baches Reportados en la Zona</h2>
          <button class="btn btn-secondary" onclick="loadBaches()" style="padding: 0.5rem 1rem; font-size: 0.85rem;">
            🔄 Actualizar
          </button>
        </div>
        
        <div class="baches-list" id="bachesList">
          <!-- Baches cargados dinámicamente -->
        </div>
      </section>
    </div>
  </main>

  <footer>
    <p>&copy; 2026 CBTis 23. Proyecto Escolar de Bacheo y Seguridad Vial, Lerma, Estado de México.</p>
  </footer>

  <script>
    // Verificar sesión del estudiante
    const user = JSON.parse(localStorage.getItem('user'));
    if (!user) {
      window.location.href = 'register.html';
    } else {
      // Mostrar usuario en el header
      const userInfo = document.getElementById('userInfo');
      userInfo.innerHTML = `
        <div class="avatar">${user.name.charAt(0).toUpperCase()}</div>
        <div style="text-align: left; font-size: 0.9rem;">
          <div style="font-weight: 600; line-height: 1.2;">${user.name}</div>
          <div style="font-size: 0.75rem; color: var(--text-secondary);">${user.email}</div>
        </div>
        <button class="btn btn-secondary" onclick="logout()" style="padding: 4px 8px; font-size: 0.75rem; margin-left: 0.5rem;">Salir</button>
      `;
    }

    function logout() {
      localStorage.removeItem('user');
      window.location.href = 'register.html';
    }

    // Cargar Baches de la API
    async function loadBaches() {
      const bachesList = document.getElementById('bachesList');
      bachesList.innerHTML = '<p style="text-align: center; padding: 2rem;">Cargando reportes...</p>';

      try {
        const response = await fetch('/api/baches');
        const data = await response.json();

        if (response.ok && data.success) {
          const baches = data.baches;
          
          if (baches.length === 0) {
            bachesList.innerHTML = `
              <div class="card" style="text-align: center; padding: 3rem;">
                <span style="font-size: 3rem;">🎉</span>
                <h3 style="margin-top: 1rem; font-weight: 600;">¡Excelente estado vial!</h3>
                <p style="margin-bottom: 0;">No hay reportes activos de baches en el CBTis 23 en este momento.</p>
              </div>
            `;
            updateStats([]);
            return;
          }

          bachesList.innerHTML = '';
          baches.forEach(bache => {
            const card = document.createElement('div');
            card.className = 'bache-card';

            const gravedadClass = `badge-${bache.gravedad.toLowerCase()}`;
            const estadoClass = `badge-${bache.estado.replace(/\s+/g, '-').toLowerCase()}`;

            const date = new Date(bache.createdAt).toLocaleDateString('es-MX', {
              day: 'numeric',
              month: 'short',
              year: 'numeric'
            });

            card.innerHTML = `
              <div class="bache-header">
                <div>
                  <h3 class="bache-title">${bache.titulo}</h3>
                  <div style="font-size: 0.8rem; color: var(--text-secondary); margin-top: 4px;">
                    📍 ${bache.ubicacion}
                  </div>
                </div>
                <div class="bache-badges">
                  <span class="badge ${gravedadClass}">Daño ${bache.gravedad}</span>
                  <span class="badge ${estadoClass}">${bache.estado}</span>
                </div>
              </div>
              <div class="bache-body">
                <p>${bache.descripcion}</p>
              </div>
              <div class="bache-footer">
                <div class="bache-meta">
                  <span>Reportado por: <strong>${bache.reportadoPor}</strong></span>
                  <span>Fecha: ${date}</span>
                </div>
                <div class="vote-section">
                  <button class="btn-vote" onclick="votarBache('${bache._id}')">
                    👍 Apoyar Reporte
                  </button>
                  <span class="votes-count" id="votos-${bache._id}">${bache.votos}</span>
                </div>
              </div>
            `;
            bachesList.appendChild(card);
          });

          updateStats(baches);
        }
      } catch (error) {
        console.error('Error al cargar baches:', error);
        bachesList.innerHTML = '<p style="text-align: center; color: #ff3b30; padding: 2rem;">Error al recuperar reportes.</p>';
      }
    }

    // Actualizar números de estadísticas
    function updateStats(baches) {
      let reportados = 0;
      let enProceso = 0;
      let reparados = 0;

      baches.forEach(bache => {
        if (bache.estado === 'Reportado') reportados++;
        else if (bache.estado === 'En proceso') enProceso++;
        else if (bache.estado === 'Reparado') reparados++;
      });

      document.getElementById('statReportados').innerText = reportados;
      document.getElementById('statProceso').innerText = enProceso;
      document.getElementById('statReparados').innerText = reparados;
    }

    // Crear un reporte
    const reportForm = document.getElementById('reportForm');
    reportForm.addEventListener('submit', async (e) => {
      e.preventDefault();

      const titulo = document.getElementById('titulo').value;
      const ubicacion = document.getElementById('ubicacion').value;
      const gravedad = document.getElementById('gravedad').value;
      const descripcion = document.getElementById('descripcion').value;

      try {
        const response = await fetch('/api/baches', {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json'
          },
          body: JSON.stringify({
            titulo,
            ubicacion,
            gravedad,
            descripcion,
            reportadoPor: user.email
          })
        });

        const data = await response.json();

        if (response.ok && data.success) {
          reportForm.reset();
          loadBaches(); // Recargar lista
          alert('¡Gracias por tu reporte estudiantil! Ya está publicado en el portal.');
        } else {
          alert('Error al enviar reporte: ' + data.message);
        }
      } catch (error) {
        console.error('Error:', error);
        alert('Error al conectar con el servidor.');
      }
    });

    // Votar por un bache
    async function votarBache(id) {
      try {
        const response = await fetch(`/api/baches/${id}/votar`, {
          method: 'POST'
        });
        const data = await response.json();

        if (response.ok && data.success) {
          const votosSpan = document.getElementById(`votos-${id}`);
          if (votosSpan) {
            votosSpan.innerText = data.bache.votos;
          }
          // Recargar para ordenar
          loadBaches();
        }
      } catch (error) {
        console.error('Error al votar:', error);
      }
    }

    // Carga inicial
    loadBaches();
  </script>
</body>
</html>
