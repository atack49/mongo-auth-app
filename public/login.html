<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Iniciar Sesión - Bacheo CETis 23</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <header>
    <div class="nav-container">
      <div class="logo">
        ⚠️ Lerma<span>Bacheo-CETis23</span>
      </div>
      <ul class="nav-links">
        <li><a href="/">Inicio</a></li>
        <li><a href="login.html" class="active">Ingresar</a></li>
        <li><a href="register.html" class="btn-nav-action">Registrarse</a></li>
      </ul>
    </div>
  </header>

  <main class="auth-wrapper">
    <div class="glass-panel auth-card">
      <h2>Iniciar Sesión</h2>
      <p class="auth-subtitle">Ingresa para reportar y apoyar en el bacheo del municipio</p>

      <form id="loginForm">
        <div class="form-group">
          <label for="email" class="form-label">Correo Electrónico</label>
          <input type="email" id="email" class="form-input" placeholder="ejemplo@correo.com" required>
        </div>

        <div class="form-group">
          <label for="password" class="form-label">Contraseña</label>
          <input type="password" id="password" class="form-input" placeholder="Ingresa tu contraseña" required>
        </div>

        <div id="errorMsg" style="color: var(--accent-red); margin-bottom: 1.5rem; display: none; font-size: 0.9rem; text-align: center;"></div>

        <button type="submit" class="btn btn-primary" style="width: 100%;">Ingresar al Panel</button>
      </form>

      <div class="auth-footer">
        ¿No tienes cuenta? <a href="register.html">Regístrate aquí</a>
      </div>
    </div>
  </main>

  <footer>
    <p>&copy; 2026 Portal de Bacheo Comunitario CETis 23. Lerma, Estado de México.</p>
  </footer>

  <script>
    const token = localStorage.getItem('token');
    if (token) {
      window.location.href = 'dashboard.html';
    }

    document.getElementById('loginForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      
      const email = document.getElementById('email').value;
      const password = document.getElementById('password').value;
      const errorMsg = document.getElementById('errorMsg');

      errorMsg.style.display = 'none';

      try {
        const response = await fetch('/api/auth/login', {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json'
          },
          body: JSON.stringify({ email, password })
        });

        const data = await response.json();

        if (data.success) {
          localStorage.setItem('token', data.token);
          window.location.href = 'dashboard.html';
        } else {
          errorMsg.textContent = data.message || 'Error al iniciar sesión';
          errorMsg.style.display = 'block';
        }
      } catch (err) {
        console.error(err);
        errorMsg.textContent = 'Ocurrió un error en el servidor. Inténtalo de nuevo.';
        errorMsg.style.display = 'block';
      }
    });
  </script>
</body>
</html>
