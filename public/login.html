<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>BacheoAlert CBTis 23 - Acceso</title>
  <link rel="stylesheet" href="style.css">
  <style>
    .auth-container {
      max-width: 440px;
      margin: 5rem auto;
      width: 100%;
      padding: 0 1rem;
    }
  </style>
</head>
<body>

  <header>
    <div class="header-container">
      <a href="index.html" class="header-logo">
        <span>🚧</span> BacheoAlert CBTis 23
      </a>
    </div>
  </header>

  <div class="auth-container">
    <div class="card">
      <h2 class="card-title" style="text-align: center;">Iniciar Sesión</h2>
      <p class="card-subtitle" style="text-align: center; margin-bottom: 2rem;">Ingresa para reportar y apoyar en el bacheo escolar</p>

      <form id="loginForm">
        <div class="form-group">
          <label class="form-label" for="email">Correo Institucional</label>
          <input type="email" id="email" class="form-input" placeholder="alumno@cbtis23.edu.mx" required>
        </div>

        <div class="form-group">
          <label class="form-label" for="password">Contraseña</label>
          <input type="password" id="password" class="form-input" placeholder="Ingresa tu contraseña" required>
        </div>

        <button type="submit" class="btn" style="width: 100%; margin-top: 1rem;">Ingresar al Panel</button>
      </form>

      <div id="errMsg" style="margin-top: 1rem; color: var(--accent-red); text-align: center; font-size: 0.9rem; display: none;"></div>

      <p style="text-align: center; margin-top: 1.5rem; font-size: 0.9rem; color: var(--text-muted);">
        ¿No tienes cuenta? <a href="register.html" style="color: var(--accent-blue); text-decoration: none; font-weight: 600;">Regístrate aquí</a>
      </p>
    </div>
  </div>

  <footer>
    <p>&copy; 2026 Portal de Bacheo Escolar CBTis 23. Lerma, Estado de México.</p>
  </footer>

  <script>
    document.getElementById('loginForm').addEventListener('submit', (e) => {
      e.preventDefault();
      const email = document.getElementById('email').value;
      const password = document.getElementById('password').value;
      const errMsg = document.getElementById('errMsg');

      errMsg.style.display = 'none';

      fetch('/api/login', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ email, password })
      })
      .then(res => res.json())
      .then(data => {
        if (data.success) {
          localStorage.setItem('token', 'simulated_token_cbtis23');
          localStorage.setItem('user', JSON.stringify(data.user));
          window.location.href = 'dashboard.html';
        } else {
          errMsg.textContent = data.message || 'Credenciales incorrectas';
          errMsg.style.display = 'block';
        }
      })
      .catch(() => {
        errMsg.textContent = 'Error al comunicar con el servidor.';
        errMsg.style.display = 'block';
      });
    });
  </script>
</body>
</html>
