<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>BacheoAlert CBTis 23 - Registro</title>
  <link rel="stylesheet" href="style.css">
  <style>
    .auth-container {
      max-width: 440px;
      margin: 4rem auto;
      width: 100%;
      padding: 0 1rem;
    }
  </style>
</head>
<body>

  <header>
    <div class="header-container">
      <a href="index.html" class="header-logo">
        <span>🚧</span> BacheoAlert CBTis 23
      </a>
    </div>
  </header>

  <div class="auth-container">
    <div class="card">
      <h2 class="card-title" style="text-align: center;">Registro Escolar</h2>
      <p class="card-subtitle" style="text-align: center; margin-bottom: 2rem;">Crea tu cuenta del CBTis 23 para participar</p>

      <form id="registerForm">
        <div class="form-group">
          <label class="form-label" for="name">Nombre Completo</label>
          <input type="text" id="name" class="form-input" placeholder="Nombre completo" required>
        </div>

        <div class="form-group">
          <label class="form-label" for="email">Correo Institucional</label>
          <input type="email" id="email" class="form-input" placeholder="alumno@cbtis23.edu.mx" required>
        </div>

        <div class="form-group">
          <label class="form-label" for="specialty">Especialidad de la Prepa</label>
          <select id="specialty" class="form-input" required style="background-color: #f5f5f7;">
            <option value="" disabled selected>Selecciona tu especialidad</option>
            <option value="Programación">Programación</option>
            <option value="Soporte y Mantenimiento">Soporte y Mantenimiento</option>
            <option value="Administración de Recursos Humanos">Administración de RRHH</option>
            <option value="Contabilidad">Contabilidad</option>
          </select>
        </div>

        <div class="form-group">
          <label class="form-label" for="password">Contraseña</label>
          <input type="password" id="password" class="form-input" placeholder="Contraseña segura" required>
        </div>

        <button type="submit" class="btn" style="width: 100%; margin-top: 1rem;">Crear Cuenta</button>
      </form>

      <div id="errMsg" style="margin-top: 1rem; color: var(--accent-red); text-align: center; font-size: 0.9rem; display: none;"></div>

      <p style="text-align: center; margin-top: 1.5rem; font-size: 0.9rem; color: var(--text-muted);">
        ¿Ya tienes cuenta? <a href="login.html" style="color: var(--accent-blue); text-decoration: none; font-weight: 600;">Inicia sesión</a>
      </p>
    </div>
  </div>

  <footer>
    <p>&copy; 2026 Portal de Bacheo Escolar CBTis 23. Lerma, Estado de México.</p>
  </footer>

  <script>
    document.getElementById('registerForm').addEventListener('submit', (e) => {
      e.preventDefault();
      const name = document.getElementById('name').value;
      const email = document.getElementById('email').value;
      const specialty = document.getElementById('specialty').value;
      const password = document.getElementById('password').value;
      const errMsg = document.getElementById('errMsg');

      errMsg.style.display = 'none';

      fetch('/api/register', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ name, email, specialty, password })
      })
      .then(res => res.json())
      .then(data => {
        if (data.success) {
          localStorage.setItem('user', JSON.stringify(data.user));
          window.location.href = 'login.html';
        } else {
          errMsg.textContent = data.message || 'Error en el registro';
          errMsg.style.display = 'block';
        }
      })
      .catch(() => {
        errMsg.textContent = 'Error al comunicar con el servidor.';
        errMsg.style.display = 'block';
      });
    });
  </script>
</body>
</html>
